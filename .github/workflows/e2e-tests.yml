name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      # ── Unit tests first (fast fail) ──────────────────────────
      - name: Run unit tests
        run: uv run pytest tests/test_scrapers.py -v

      # ── Alert pipeline tests (mock Slack + SMTP) ─────────────
      - name: Run alert e2e tests
        run: uv run pytest tests/e2e/test_alerts.py -v --timeout=60

      # ── UI tests (Streamlit + Playwright) ─────────────────────
      - name: Run UI e2e tests
        run: uv run pytest tests/e2e/test_ui.py -v --timeout=120

      # ── Logs ──────────────────────────────────────────────────
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: |
            logs/
            test-results/
          retention-days: 14
