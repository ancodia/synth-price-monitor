name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      # ── Unit tests first (fast fail) ──────────────────────────
      - name: Run unit tests
        run: uv run pytest tests/unit/test_scrapers.py -v --junit-xml=test-results/unit.xml

      # ── Alert pipeline tests (mock Slack + SMTP) ─────────────
      - name: Run alert e2e tests
        run: uv run pytest tests/e2e/test_alerts.py -v --timeout=60 --junit-xml=test-results/alerts.xml

      # ── UI tests (Streamlit + Playwright) ─────────────────────
      - name: Run UI e2e tests
        run: uv run pytest tests/e2e/test_ui.py -v --timeout=120 --junit-xml=test-results/ui.xml --tracing=retain-on-failure --html=test-results/report.html --self-contained-html

      # ── Publish test results ───────────────────────────────────
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: test-results/*.xml
          reporter: java-junit

      # ── Upload HTML report (always) ───────────────────────────
      - name: Upload UI test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: test-results/report.html
          retention-days: 14

      # ── Upload Playwright traces on failure ────────────────────
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
