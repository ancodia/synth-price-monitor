name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      # ── Alert pipeline tests (mock Slack + SMTP) ─────────────
      - name: Run alert e2e tests
        run: uv run pytest tests/e2e/test_alerts.py -v --timeout=60 --junit-xml=test-results/alerts.xml

      # ── UI tests (Streamlit + Playwright) ─────────────────────
      - name: Run UI e2e tests
        run: uv run pytest tests/e2e/test_ui.py -v --timeout=120 --junit-xml=test-results/ui.xml --tracing=retain-on-failure --html=test-results/report.html --self-contained-html

      # ── Publish e2e test results ───────────────────────────────
      - name: Publish e2e test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Test Results
          path: test-results/alerts.xml,test-results/ui.xml
          reporter: java-junit

      # ── Upload HTML report as artifact ─────────────────────────
      - name: Upload UI test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: test-results/report.html
          retention-days: 14

      # ── Upload Playwright traces on failure ────────────────────
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14

  # ── Deploy HTML report to GitHub Pages (main branch only) ─────
  deploy-report:
    needs: e2e
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download HTML report
        uses: actions/download-artifact@v4
        with:
          name: ui-test-report
          path: _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
